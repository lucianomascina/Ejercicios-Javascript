<html>

	<script type="text/javascript">

			{
				alert("no tienes acceso\ndebes tener 18 años");	
			}
			else
			{
				alert("bienvenido a la página");
			}
		}
	</script>
	<title></title>
</head>
<body>
	<form>

	</form>
</body>
</html>
