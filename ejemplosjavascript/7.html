<!DOCTYPE html>
<html>
<head>
	<script type="text/javascript">
		function confirma()
		{
			var respuesta=confirm("pulsa un boton");
			if(respuesta==true)
			{
				alert("has pulsado aceptar");
			}
			else
			{
				alert("has pulsado cancelar");
			}
		}

	</script>
	<title></title>
</head>
<body onload="confirma()";>

</body>
</html>
